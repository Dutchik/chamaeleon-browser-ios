name: Chamaeleon
options:
  bundleIdPrefix: com.awokela
  deploymentTarget:
    iOS: "16.0"
attributes:
  LastUpgradeCheck: "9999"
settings:
  base:
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "ダウンロードした画像・動画を写真ライブラリに保存します。"
targets:
  Chamaeleon:
    type: application
    platform: iOS
    scheme: {}
    sources:
      - path: Chamaeleon
    dependencies:
      - framework: Vendor/OpenSSL.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awokela.chamaeleon.ios
        HEADER_SEARCH_PATHS: $(inherited) $(PROJECT_DIR)/Vendor/OpenSSL.xcframework/ios-arm64/Headers $(PROJECT_DIR)/Vendor/OpenSSL.xcframework/ios-arm64-simulator/Headers
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64   # 同梱OpenSSLはarm64のみ（Apple Silicon）
        PRODUCT_NAME: Chamaeleon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Chamaeleon/Chamaeleon-Bridging-Header.h
        # Mac Catalyst は廃止（ネイティブMac版 chamaeleon-browser-mac が担当）。
        # 同梱OpenSSL(iOS用)はmaccatalystスライスを持たないため無効化。
        SUPPORTS_MACCATALYST: NO
